<!DOCTYPE html>
<html lang="de">
<<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Dein Dashboard</h1>
  <nav>
    <a href="index.html">Startseite</a>
    <a href="server-pakete.html">Server-Pakete</a>
    <a href="support.html">Support</a>
    <a href="login.html">Logout</a>
  </nav>
</header>

<main>

  <!-- USER INFO -->
  <section class="user-info">
    <h2>Willkommen, <span id="userName">Benutzer</span></h2>
    <p>Rang: <span id="userRank">Free</span></p>
  </section>

  <!-- SERVER LIST -->
  <section class="server-section">
    <h2>Deine Server</h2>
    <div id="serverList" class="server-grid">
      <p>Du hast noch keine Server.</p>
    </div>
  </section>

  <!-- SERVER ERSTELLEN -->
  <section class="create-server">
    <h2>Neuen Server erstellen</h2>

    <input id="serverName" placeholder="Servername">

    <select id="serverPlan">
      <option value="free">Free</option>
      <option value="basic">Basic</option>
      <option value="advanced">Advanced</option>
      <option value="ultimate">Ultimate</option>
      <option value="titan">Titan</option>
      <option value="omega">Omega</option>
    </select>

    <select id="serverType">
      <option value="vanilla">Vanilla</option>
      <option value="paper">Paper</option>
      <option value="spigot">SpigotMC</option>
      <option value="purpur">Purpur</option>
      <option value="fabric">Fabric</option>
      <option value="forge">Forge</option>
      <option value="neoforge">NeoForge</option>
      <option value="bungeecord">BungeeCord</option>
      <option value="velocity">Velocity</option>
    </select>

    <input id="serverRam" placeholder="RAM (z.B. 4G)">
    <input id="serverVersion" placeholder="Version (z.B. 1.20.1)">

    <button id="createBtn" disabled>Erstellen (Backend kommt später)</button>
  </section>

  <!-- LOGS -->
  <section class="logs-section">
    <h2>Logs</h2>
    <pre id="logBox">Logs werden hier angezeigt, sobald das Backend fertig ist.</pre>
  </section>

  <!-- MODS & PLUGINS -->
  <section class="mods-section">
    <h2>Plugins & Mods</h2>

    <div class="mods-upload">
      <input type="file" id="modFile" accept=".jar,.zip">
      <button disabled>Hochladen (Backend kommt später)</button>
    </div>

    <div id="modsList" class="mods-list">
      <p>Noch keine Mods oder Plugins installiert.</p>
    </div>
  </section>

</main>

</body>
</html>
