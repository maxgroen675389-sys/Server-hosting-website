<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Ticket erstellen – HostPanel</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    body {
      background: #0b0b0f;
      color: #fff;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    .content {
      margin-left: 260px;
      padding: 30px;
    }

    .ticket-form {
      background: #111;
      padding: 20px;
      border-radius: 10px;
      border: 1px solid #333;
      max-width: 500px;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #0b0b0f;
      color: #fff;
    }

    button {
      padding: 12px 20px;
      background: #4cafef;
      border: none;
      border-radius: 8px;
      color: #000;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #63c2ff;
    }
  </style>
</head>
<body>

<main class="content">

  <h1>Ticket erstellen</h1>
  <p>Beschreibe dein Problem so genau wie möglich.</p>

  <div class="ticket-form">

    <label>Kategorie</label>
    <select id="category">
      <option>Server</option>
      <option>Mods</option>
      <option>Plugins</option>
      <option>Performance</option>
      <option>Netzwerk</option>
      <option>Login</option>
      <option>Sonstiges</option>
    </select>

    <label>Betreff</label>
    <input id="subject" type="text" placeholder="z. B. Server startet nicht">

    <label>Beschreibung</label>
    <textarea id="message" placeholder="Beschreibe dein Problem..."></textarea>

    <button onclick="sendTicket()">Ticket senden</button>

  </div>

</main>

<script>
async function sendTicket() {
  const category = document.getElementById("category").value;
  const subject = document.getElementById("subject").value;
  const message = document.getElementById("message").value;

  if (!subject || !message) {
    alert("Bitte Betreff und Beschreibung ausfüllen.");
    return;
  }

  const res = await fetch("http://localhost:3000/api/ticket", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ category, subject, message })
  });

  const data = await res.json();

  if (data.success) {
    alert("Ticket wurde erfolgreich erstellt!");
  } else {
    alert("Fehler beim Erstellen des Tickets.");
  }
}
</script>

</body>
</html>
